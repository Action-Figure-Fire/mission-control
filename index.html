<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control 🦉</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
    padding: 24px;
  }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: #fff; }
  .subtitle { color: #7d8590; font-size: 14px; margin-bottom: 32px; }

  /* Stats */
  .stats { display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
  .stat-box {
    background: #161b22; border: 1px solid #30363d; border-radius: 12px;
    padding: 16px 24px; text-align: center; flex: 1; min-width: 80px;
  }
  .stat-number { font-size: 32px; font-weight: 700; color: #fff; }
  .stat-label { font-size: 12px; color: #7d8590; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

  /* Calendar */
  .calendar-section { margin-bottom: 32px; }
  .section-title { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 16px; }
  .calendar-wrapper {
    background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; overflow-x: auto;
  }
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-nav button {
    background: #21262d; border: 1px solid #30363d; color: #e6edf3; border-radius: 8px;
    padding: 6px 14px; cursor: pointer; font-size: 14px;
  }
  .cal-nav button:hover { border-color: #58a6ff; }
  .cal-month { font-size: 18px; font-weight: 600; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-header { font-size: 11px; color: #7d8590; text-align: center; padding: 4px; font-weight: 600; }
  .cal-day {
    min-height: 70px; background: #0d1117; border: 1px solid #21262d; border-radius: 6px;
    padding: 4px 6px; font-size: 12px; position: relative; cursor: pointer; transition: border-color 0.2s;
  }
  .cal-day:hover { border-color: #58a6ff; }
  .cal-day.other-month { opacity: 0.3; }
  .cal-day.today { border-color: #58a6ff; background: rgba(88, 166, 255, 0.05); }
  .cal-day-num { font-weight: 600; margin-bottom: 4px; color: #e6edf3; }
  .cal-event {
    font-size: 10px; padding: 2px 4px; border-radius: 3px; margin-bottom: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;
  }
  .cal-event.todo { background: #1f6feb33; color: #58a6ff; }
  .cal-event.channel { background: #23863633; color: #3fb950; }
  .cal-event-more { font-size: 10px; color: #7d8590; }

  /* Add Event Modal */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #161b22; border: 1px solid #30363d; border-radius: 12px;
    padding: 24px; width: 90%; max-width: 400px;
  }
  .modal h3 { margin-bottom: 16px; font-size: 18px; }
  .modal label { display: block; font-size: 13px; color: #7d8590; margin-bottom: 4px; margin-top: 12px; }
  .modal input, .modal select {
    width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 8px;
    padding: 8px 12px; color: #e6edf3; font-size: 14px; outline: none;
  }
  .modal input:focus, .modal select:focus { border-color: #58a6ff; }
  .modal-buttons { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
  .btn-cancel { background: #21262d; color: #e6edf3; border: 1px solid #30363d; border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: 14px; }
  .btn-save { background: #238636; color: #fff; border: none; border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: 14px; font-weight: 600; }

  /* Channel Grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(320px, 100%), 1fr)); gap: 16px; }
  .card {
    background: #161b22; border: 1px solid #30363d; border-radius: 12px;
    padding: 20px; transition: border-color 0.2s;
  }
  .card:hover { border-color: #58a6ff; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .channel-name { font-size: 18px; font-weight: 600; color: #fff; }
  .channel-name.has-icon::before { content: none; }
  .channel-name::before { content: '#'; color: #7d8590; margin-right: 2px; }
  .progress-badge { font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
  .progress-active { background: #1f6feb; color: #fff; }
  .progress-empty { background: #30363d; color: #7d8590; }
  .progress-bar-container { height: 4px; background: #30363d; border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, #238636, #2ea043); border-radius: 2px; transition: width 0.3s ease; }
  .task-list { list-style: none; margin-bottom: 12px; }
  .task-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #21262d; font-size: 14px; }
  .task-item:last-child { border-bottom: none; }
  .task-check {
    width: 20px; height: 20px; border-radius: 50%; border: 2px solid #30363d;
    cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; background: transparent; color: transparent; font-size: 11px;
  }
  .task-check:hover { border-color: #238636; background: rgba(35, 134, 54, 0.15); color: #238636; }
  .task-text { flex: 1; }
  .task-date { font-size: 11px; color: #7d8590; flex-shrink: 0; }
  .add-task-row { display: flex; gap: 8px; }
  .add-task-input {
    flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 8px;
    padding: 8px 12px; color: #e6edf3; font-size: 14px; outline: none;
  }
  .add-task-input:focus { border-color: #58a6ff; }
  .add-task-input::placeholder { color: #484f58; }
  .btn-add {
    background: #238636; color: #fff; border: none; border-radius: 8px;
    padding: 8px 16px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .btn-add:hover { background: #2ea043; }
  .empty-state { color: #484f58; font-size: 13px; font-style: italic; padding: 8px 0; }
  .completing { animation: fadeOut 0.4s ease forwards; }
  @keyframes fadeOut { to { opacity: 0; height: 0; padding: 0; overflow: hidden; border: none; } }

  /* Mobile */
  @media (max-width: 480px) {
    body { padding: 16px; }
    h1 { font-size: 22px; }
    .grid, .cal-grid-wrapper { grid-template-columns: 1fr; }
    .stat-number { font-size: 24px; }
    .stat-box { padding: 12px 16px; }
    .card { padding: 16px; }
    .channel-name { font-size: 16px; }
    .task-check { width: 28px; height: 28px; font-size: 14px; }
    .add-task-input { font-size: 16px; padding: 10px 12px; }
    .btn-add { padding: 10px 14px; font-size: 14px; }
    .cal-day { min-height: 50px; }
  }
  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<h1>🚀 Mission Control</h1>
<p class="subtitle">Zach's command center — managed by Olga</p>

<div class="stats" id="stats"></div>

<!-- Calendar -->
<div class="calendar-section">
  <div class="section-title">📅 Calendar</div>
  <div class="calendar-wrapper">
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">← Prev</button>
      <span class="cal-month" id="calMonth"></span>
      <button onclick="changeMonth(1)">Next →</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<!-- Channel Cards -->
<div class="section-title" style="margin-bottom:16px">📡 Channels</div>
<div class="grid" id="grid"></div>

<!-- Add Event Modal -->
<div class="modal-overlay" id="eventModal">
  <div class="modal">
    <h3>Add Event</h3>
    <label>Title</label>
    <input type="text" id="eventTitle" placeholder="What's happening?">
    <label>Date</label>
    <input type="date" id="eventDate">
    <label>Channel</label>
    <select id="eventChannel"></select>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEvent()">Save</button>
    </div>
  </div>
</div>

<script>
const CHANNELS = [
  { id: "todo", name: "to-do", icon: "📋" },
  { id: "1475534033931997368", name: "general" },
  { id: "1475841895606255707", name: "health" },
  { id: "1475865912350605457", name: "optimus🤖" },
  { id: "1476280319219990781", name: "mitch-and-the-sandbridge" },
  { id: "1476322307084386385", name: "blackbeard🏴‍☠️" }
];

const STORAGE_KEY = "olga_mission_control";
const EVENTS_KEY = "olga_calendar_events";

let calYear, calMonth;

// Seed defaults
(function seedDefaults() {
  const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
  if (!data["todo"] || data["todo"].length === 0) {
    data["todo"] = [
      { text: "Contact Jarad", created: Date.now() },
      { text: "Contact notebook guy from 165 email", created: Date.now() },
      { text: "Contact Acura", created: Date.now() }
    ];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }
})();

// Populate channel dropdown
(function initChannelSelect() {
  const sel = document.getElementById('eventChannel');
  CHANNELS.forEach(ch => {
    const opt = document.createElement('option');
    opt.value = ch.id;
    opt.textContent = (ch.icon ? ch.icon + ' ' : '#') + ch.name;
    sel.appendChild(opt);
  });
})();

// Tasks
function loadTasks() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
function saveTasks(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function addTask(channelId, text) {
  if (!text.trim()) return;
  const data = loadTasks();
  if (!data[channelId]) data[channelId] = [];
  data[channelId].push({ text: text.trim(), created: Date.now() });
  saveTasks(data);
  render();
}

function completeTask(channelId, index) {
  const el = document.querySelector(`[data-channel="${channelId}"] .task-item:nth-child(${index + 1})`);
  if (el) {
    el.classList.add('completing');
    setTimeout(() => {
      const data = loadTasks();
      if (data[channelId]) { data[channelId].splice(index, 1); saveTasks(data); }
      render();
    }, 400);
  }
}

// Calendar Events
function loadEvents() { try { return JSON.parse(localStorage.getItem(EVENTS_KEY)) || []; } catch { return []; } }
function saveEvents(evts) { localStorage.setItem(EVENTS_KEY, JSON.stringify(evts)); }

function openModal(dateStr) {
  document.getElementById('eventDate').value = dateStr || new Date().toISOString().split('T')[0];
  document.getElementById('eventTitle').value = '';
  document.getElementById('eventModal').classList.add('active');
  setTimeout(() => document.getElementById('eventTitle').focus(), 100);
}

function closeModal() { document.getElementById('eventModal').classList.remove('active'); }

function saveEvent() {
  const title = document.getElementById('eventTitle').value.trim();
  const date = document.getElementById('eventDate').value;
  const channel = document.getElementById('eventChannel').value;
  if (!title || !date) return;
  const evts = loadEvents();
  evts.push({ title, date, channel, id: Date.now() });
  saveEvents(evts);
  closeModal();
  renderCalendar();
}

function deleteEvent(id) {
  let evts = loadEvents();
  evts = evts.filter(e => e.id !== id);
  saveEvents(evts);
  renderCalendar();
}

// Calendar rendering
function changeMonth(delta) {
  calMonth += delta;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function renderCalendar() {
  const now = new Date();
  if (calYear === undefined) { calYear = now.getFullYear(); calMonth = now.getMonth(); }

  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calMonth').textContent = `${months[calMonth]} ${calYear}`;

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();

  const events = loadEvents();
  const grid = document.getElementById('calGrid');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  let html = days.map(d => `<div class="cal-header">${d}</div>`).join('');

  // Previous month days
  for (let i = firstDay - 1; i >= 0; i--) {
    const day = daysInPrev - i;
    html += `<div class="cal-day other-month"><div class="cal-day-num">${day}</div></div>`;
  }

  // Current month days
  const todayStr = now.toISOString().split('T')[0];
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === todayStr;
    const dayEvents = events.filter(e => e.date === dateStr);

    let eventsHtml = '';
    const maxShow = 2;
    dayEvents.slice(0, maxShow).forEach(e => {
      const ch = CHANNELS.find(c => c.id === e.channel);
      const cls = e.channel === 'todo' ? 'todo' : 'channel';
      eventsHtml += `<div class="cal-event ${cls}" title="${escapeAttr(e.title)} (${ch ? ch.name : ''})" onclick="event.stopPropagation(); if(confirm('Delete: ${escapeAttr(e.title)}?')) deleteEvent(${e.id})">${escapeHtml(e.title)}</div>`;
    });
    if (dayEvents.length > maxShow) {
      eventsHtml += `<div class="cal-event-more">+${dayEvents.length - maxShow} more</div>`;
    }

    html += `<div class="cal-day${isToday ? ' today' : ''}" onclick="openModal('${dateStr}')">
      <div class="cal-day-num">${d}</div>${eventsHtml}</div>`;
  }

  // Fill remaining
  const totalCells = firstDay + daysInMonth;
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= remaining; i++) {
    html += `<div class="cal-day other-month"><div class="cal-day-num">${i}</div></div>`;
  }

  grid.innerHTML = html;
}

function render() {
  const statsEl = document.getElementById('stats');
  const grid = document.getElementById('grid');
  const allTasks = loadTasks();
  const events = loadEvents();

  let totalTasks = 0, channelsWithTasks = 0;
  CHANNELS.forEach(ch => {
    const t = allTasks[ch.id] || [];
    totalTasks += t.length;
    if (t.length > 0) channelsWithTasks++;
  });

  statsEl.innerHTML = `
    <div class="stat-box"><div class="stat-number">${CHANNELS.length}</div><div class="stat-label">Channels</div></div>
    <div class="stat-box"><div class="stat-number">${totalTasks}</div><div class="stat-label">Open Tasks</div></div>
    <div class="stat-box"><div class="stat-number">${channelsWithTasks}</div><div class="stat-label">Active</div></div>
    <div class="stat-box"><div class="stat-number">${events.length}</div><div class="stat-label">Events</div></div>
  `;

  grid.innerHTML = CHANNELS.map(ch => {
    const tasks = allTasks[ch.id] || [];
    const badgeClass = tasks.length === 0 ? 'progress-empty' : 'progress-active';
    const badgeText = tasks.length === 0 ? 'Clear' : `${tasks.length} task${tasks.length > 1 ? 's' : ''}`;

    const taskItems = tasks.length > 0
      ? tasks.map((t, i) => `
          <li class="task-item">
            <button class="task-check" onclick="completeTask('${ch.id}', ${i})" title="Complete">✓</button>
            <span class="task-text">${escapeHtml(t.text)}</span>
          </li>`).join('')
      : '<li class="empty-state">No tasks — looking good ✨</li>';

    return `
      <div class="card" data-channel="${ch.id}">
        <div class="card-header">
          <span class="channel-name${ch.icon ? ' has-icon' : ''}">${ch.icon ? ch.icon + ' ' : ''}${escapeHtml(ch.name)}</span>
          <span class="progress-badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar" style="width: ${tasks.length === 0 ? 100 : 0}%"></div>
        </div>
        <ul class="task-list">${taskItems}</ul>
        <div class="add-task-row">
          <input class="add-task-input" placeholder="Add a task..." onkeydown="if(event.key==='Enter'){addTask('${ch.id}', this.value); this.value='';}" />
          <button class="btn-add" onclick="const inp=this.previousElementSibling; addTask('${ch.id}', inp.value); inp.value='';">+ Add</button>
        </div>
      </div>`;
  }).join('');
}

function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
function escapeAttr(str) { return str.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

render();
renderCalendar();
</script>
</body>
</html>
